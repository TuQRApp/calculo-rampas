  <meta charset="UTF-8">

  <title>Cálculo de rampas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 36px 40px 40px;
      max-width: 900px;
      width: 100%;

    .header { margin-bottom: 28px; }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;

      margin-bottom: 4px;

      font-size: 0.92rem;
      color: #666;
    }

    .formula-badge {
      display: inline-block;
      margin-top: 8px;
      background: #eef2ff;
      color: #3730a3;
      font-family: 'Courier New', monospace;

      border-radius: 20px;

    .input-section {
      display: flex;
      align-items: center;
      gap: 16px;

      border: 1.5px solid #f59e0b;

    }

    .input-section label {
      font-weight: 600;
      font-size: 0.95rem;
      color: #444;
      white-space: nowrap;
    }

    .input-section input#h {
      width: 110px;
      padding: 8px 12px;
      border: 1.5px solid #f59e0b;
      border-radius: 6px;
      font-size: 1.05rem;
      font-weight: 600;
      background: #fff;
      color: #1a1a2e;
      outline: none;
      text-align: center;
    }
    .input-section input#h:focus {
      border-color: #d97706;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
    }
    .input-section input#h.invalid {
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
    }

    .scroll-hint {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;

      margin-bottom: 8px;
    }
    .scroll-hint svg { flex-shrink: 0; }

    @media (max-width: 480px) {

      .card { padding: 20px 14px 24px; border-radius: 8px; }
      h1 { font-size: 1.25rem; }
      .subtitle { font-size: 0.82rem; }
      .formula-badge { font-size: 0.78rem; padding: 3px 10px; }

      table { font-size: 0.75rem; }

    .input-unit { color: #888; font-size: 0.9rem; }

    #btn-calcular {
      padding: 8px 20px;

    #btn-calcular:hover { background: #2d2d4e; }
    #btn-calcular:active { background: #111122; }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead tr {
      background: #1a1a2e;
      color: #fff;
    }

    thead th {
      padding: 11px 14px;
      text-align: center;

      white-space: nowrap;

    thead th:first-child { text-align: center; }

    tbody tr:nth-child(even) { background: #f8f9fb; }

    tbody td {
      padding: 9px 14px;
      text-align: center;

    }

    td.no-puede {
      color: #dc2626;

      font-size: 0.8rem;
    }

    tr.best-row {
      background: #dcfce7 !important;
      font-weight: 700;
    }
    tr.best-row td { color: #166534; }

    .tfoot-row td {
      padding: 10px 14px;
      background: #f1f5f9;
      font-weight: 700;
      border-top: 2px solid #cbd5e1;
      color: #334155;
    }

    .min-label {
      text-align: right !important;
      font-size: 0.8rem;

      font-weight: 600;
      letter-spacing: 0.04em;

      margin-top: 20px;

      line-height: 1.6;

<body>
<div class="card">
  <div class="header">
    <h1>Cálculo de rampas</h1>
    <div class="subtitle">Rampas Art. 4.1.7 OGUC</div>
    <span class="formula-badge">i% = 12,8 − 0,5333 · L</span>
  </div>

  <div class="input-section">
    <label for="h">Altura a subir</label>
    <input type="text" id="h" inputmode="decimal" placeholder="ej: 1,50" value="1">
    <span class="input-unit">m</span>
    <button id="btn-calcular" onclick="render()">Calcular</button>
  </div>

  <div class="scroll-hint">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    Desliza para ver toda la tabla
  </div>
  <div class="table-wrap">
    <table id="tabla">
      <thead>
        <tr>
          <th>Cant.<br>tramos</th>
          <th>h tramo<br>(m)</th>
          <th>Largo tramo<br>(m)</th>
          <th>Pendiente tramo<br>(i%)</th>
          <th>Largo rampa<br>(m)</th>
          <th>Cant.<br>descansos</th>
          <th>Largo<br>descansos (m)</th>
          <th>Largo total<br>(m)</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>

</div>

<script>
  const LARGO_DESCANSO = 1.50;

  function calcRow(n, h) {
    const hTramo = h / n;
    // Quadratic: (0.5333/100)*L^2 - (12.8/100)*L + hTramo = 0
    const a = 0.5333 / 100;
    const b = -12.8 / 100;
    const c = hTramo;
    const disc = b * b - 4 * a * c;
    if (disc < 0) return null;
    // take the root that gives valid (positive) slope
    const L = (-b - Math.sqrt(disc)) / (2 * a);
    if (L <= 0) return null;
    const pendiente = 12.8 - 0.5333 * L;
    if (pendiente <= 0) return null;
    const largoRampa = n * L;
    const cantDescansos = n - 1;
    const largoDescansos = cantDescansos * LARGO_DESCANSO;
    const largoTotal = largoRampa + largoDescansos;
    return { hTramo, L, pendiente, largoRampa, cantDescansos, largoDescansos, largoTotal };
  }

  function fmt(v, dec = 2) {
    return v.toFixed(dec).replace('.', ',');
  }

  function render() {
    const input = document.getElementById('h');
    const raw = input.value.replace(',', '.');
    const h = parseFloat(raw);
    input.classList.toggle('invalid', !h || h <= 0);
    if (!h || h <= 0) return;

    const rows = [];
    for (let n = 1; n <= 10; n++) {
      rows.push({ n, result: calcRow(n, h) });
    }

    // find best (minimum largo total among valid rows)
    let minTotal = Infinity, bestN = -1;
    rows.forEach(({ n, result }) => {
      if (result && result.largoTotal < minTotal) {
        minTotal = result.largoTotal;
        bestN = n;
      }
    });

    const tbody = document.getElementById('tbody');
    const tfoot = document.getElementById('tfoot');
    tbody.innerHTML = '';
    tfoot.innerHTML = '';

    rows.forEach(({ n, result }) => {
      const tr = document.createElement('tr');
      if (n === bestN) tr.className = 'best-row';

      if (!result) {
        tr.innerHTML = `
          <td>${n}</td>
          <td>${fmt(h / n)}</td>
          <td class="no-puede">no se puede</td>
          <td>—</td><td>—</td>
          <td>${n - 1}</td>
          <td>${fmt((n - 1) * LARGO_DESCANSO)}</td>
          <td>—</td>
        `;
      } else {
        const { hTramo, L, pendiente, largoRampa, cantDescansos, largoDescansos, largoTotal } = result;
        tr.innerHTML = `
          <td>${n}</td>
          <td>${fmt(hTramo)}</td>
          <td>${fmt(L)}</td>
          <td>${fmt(pendiente)}</td>
          <td>${fmt(largoRampa)}</td>
          <td>${cantDescansos}</td>
          <td>${fmt(largoDescansos)}</td>
          <td><strong>${fmt(largoTotal)}</strong></td>
        `;
      }
      tbody.appendChild(tr);
    });

    if (bestN > 0) {
      tfoot.innerHTML = `
        <tr class="tfoot-row">
          <td colspan="7" class="min-label">LARGO TOTAL MÍNIMO</td>
          <td><strong>${fmt(minTotal)}</strong></td>
        </tr>
      `;
    }
  }

  document.getElementById('h').addEventListener('keydown', e => { if (e.key === 'Enter') render(); });
  document.getElementById('btn-calcular').addEventListener('click', () => {
  gtag('event', 'click_calcular_rampa');
});
  render();
</script>
</body>
</html>
